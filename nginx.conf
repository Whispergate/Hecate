# hecate/nginx.conf
#
# Ground truth from mythic_nginx/conf.d/services.conf:
#   /graphql/  → http://mythic_graphql:8080/v1/graphql  (trailing slash required)
#   /auth      → http://mythic_server:17443/auth
#
# We proxy to mythic_nginx:7443 which handles the internal routing.
# Must use /graphql/ with trailing slash — /graphql redirects 301.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    resolver 127.0.0.11 valid=5s ipv6=off;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
    gzip_min_length 1024;

    # ── Auth: /auth (no trailing slash, matches mythic_nginx exactly) ──
    location = /auth {
        set $upstream https://mythic_nginx:7443;
        proxy_pass              $upstream/auth;
        proxy_http_version      1.1;
        proxy_ssl_verify        off;
        proxy_set_header        Host          $http_host;
        proxy_set_header        X-Real-IP     $remote_addr;
        proxy_set_header        X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto https;
        proxy_pass_request_headers on;
        proxy_pass_request_body    on;
    }

    # ── GraphQL: /graphql/ WITH trailing slash ──────────
    # mythic_nginx only accepts /graphql/ — /graphql gets a 301
    location /graphql/ {
        set $upstream https://mythic_nginx:7443;
        proxy_pass              $upstream/graphql/;
        proxy_http_version      1.1;
        proxy_ssl_verify        off;
        proxy_set_header        Upgrade       $http_upgrade;
        proxy_set_header        Connection    $connection_upgrade;
        proxy_set_header        Host          $http_host;
        proxy_set_header        X-Real-IP     $remote_addr;
        proxy_set_header        X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto https;
        proxy_set_header        Authorization $http_authorization;
        proxy_pass_request_headers on;
        proxy_read_timeout      3600s;
        proxy_send_timeout      3600s;
    }

    # ── Mythic documentation ──────────────────────────
    location ^~ /docs/ {
        set $upstream https://mythic_nginx:7443;
        proxy_pass              $upstream$request_uri;
        proxy_http_version      1.1;
        proxy_ssl_verify        off;
        proxy_set_header        Host          $http_host;
        proxy_set_header        X-Real-IP     $remote_addr;
        proxy_set_header        X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── Agent SVG icons — served by Mythic Go server ──
    # ^~ prevents the svg/png regex cache rule below from stealing these requests
    location ^~ /static/ {
        set $upstream https://mythic_nginx:7443;
        proxy_pass              $upstream$request_uri;
        proxy_http_version      1.1;
        proxy_ssl_verify        off;
        proxy_set_header        Host          $http_host;
        proxy_set_header        X-Real-IP     $remote_addr;
        proxy_set_header        X-Forwarded-For $proxy_add_x_forwarded_for;
        expires 1d;
    }

    # ── Direct file download (payloads, uploads) ──────
    # Use $request_uri to avoid URI mangling that occurs when proxy_pass
    # uses a variable — variable-based proxy_pass skips prefix substitution.
    location /direct/ {
        set $upstream https://mythic_nginx:7443;
        proxy_pass              $upstream$request_uri;
        proxy_http_version      1.1;
        proxy_ssl_verify        off;
        proxy_set_header        Host          $http_host;
        proxy_set_header        X-Real-IP     $remote_addr;
        proxy_set_header        X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header        Authorization $http_authorization;
        proxy_pass_request_headers on;
        proxy_buffering         off;
    }

    # ── SPA fallback ──────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
