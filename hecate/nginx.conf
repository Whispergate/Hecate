# hecate/nginx.conf
#
# Serves the Hecate SPA and proxies /graphql + /auth
# to the Mythic backend so the browser never hits CORS.
#
# Set MYTHIC_UPSTREAM to your Mythic host at runtime:
#   docker run -e MYTHIC_UPSTREAM=https://10.0.0.1:7443 ...
# (requires envsubst — see docker-compose.yml)

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Gzip ───────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
    gzip_min_length 1024;

    # ── SPA fallback ───────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Proxy: Mythic GraphQL (HTTP + WS) ──────────
    location /graphql {
        proxy_pass          https://mythic-backend:7443/graphql;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade $http_upgrade;
        proxy_set_header    Connection "upgrade";
        proxy_set_header    Host $host;
        proxy_set_header    X-Real-IP $remote_addr;
        proxy_ssl_verify    off;   # self-signed cert in dev
    }

    # ── Proxy: Mythic auth endpoint ─────────────────
    location /auth/ {
        proxy_pass        https://mythic-backend:7443/auth/;
        proxy_set_header  Host $host;
        proxy_set_header  X-Real-IP $remote_addr;
        proxy_ssl_verify  off;
    }

    # ── Cache static assets ─────────────────────────
    location ~* \.(js|css|png|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
